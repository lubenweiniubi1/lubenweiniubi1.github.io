<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📒 学习笔记导航</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; margin: 0; background: #f8f9fb; color: #2c3e50;
    }
    .card {
      background: #fff; border-radius: 12px; padding: 40px 48px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-align: center; max-width: 480px;
    }
    h2 { margin: 0 0 12px; }
    p { color: #6b7c93; line-height: 1.7; margin: 8px 0; }
    code {
      background: #eef1ff; color: #4f6ef7; padding: 3px 8px;
      border-radius: 4px; font-size: 0.9em;
    }
    .btn {
      display: inline-block; margin-top: 20px; padding: 12px 28px;
      background: linear-gradient(135deg, #4f6ef7, #7c5cfc);
      color: #fff; text-decoration: none; border-radius: 50px;
      font-weight: 600; transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="card">
    <h2>🚀 请使用 Node.js 启动</h2>
    <p>本页面由 <code>startup.js</code> 服务端渲染，</p>
    <p>会动态扫描 <code>notes/</code> 目录生成最新笔记索引。</p>
    <p style="margin-top:16px">在终端运行：</p>
    <p><code>node startup.js</code></p>
    <a class="btn" href="http://localhost:3001">→ 打开 localhost:3001</a>
  </div>
</body>
</html>
